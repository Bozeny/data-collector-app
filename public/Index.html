<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Collector - Mobile App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📱 Data Collector</h1>
            <p>Collect data offline and online</p>
        </header>

        <div class="status" id="status">Status: Ready</div>

        <main>
            <section class="form-section">
                <h2>Enter Data</h2>
                <form id="dataForm">
                    <div class="form-group">
                        <label for="field1">Field 1 *</label>
                        <input type="text" id="field1" placeholder="Enter Field 1 data" required>
                    </div>

                    <div class="form-group">
                        <label for="field2">Field 2 *</label>
                        <input type="text" id="field2" placeholder="Enter Field 2 data" required>
                    </div>

                    <div class="form-group">
                        <label for="field3">Field 3 (Optional)</label>
                        <input type="text" id="field3" placeholder="Enter Field 3 data (optional)">
                    </div>

                    <button type="submit" class="btn btn-primary">Submit Data</button>
                </form>
            </section>

            <section class="data-section">
                <h2>Collected Data</h2>
                <div class="button-group">
                    <button class="btn btn-secondary" onclick="loadData()">Refresh Data</button>
                    <button class="btn btn-secondary" onclick="exportData()">Export as CSV</button>
                    <button class="btn btn-danger" onclick="clearAllData()">Clear All</button>
                </div>
                <div id="dataContainer" class="data-container">Loading...</div>
            </section>
        </main>

        <footer>
            <p>Data will be synced to Microsoft Access. <a href="/docs" target="_blank">View Documentation</a></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
