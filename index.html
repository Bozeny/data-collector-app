<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Collector App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Collecteur de Données</h1>
        <p class="subtitle">Veuillez remplir le formulaire pour enregistrer les informations.</p>
        
        <form id="collectorForm" onsubmit="event.preventDefault(); submitData();">
            <div class="form-group">
                <label for="field1">Champ 1 :</label>
                <input type="text" id="field1" required placeholder="Entrez la première donnée...">
            </div>

            <div class="form-group">
                <label for="field2">Champ 2 :</label>
                <input type="text" id="field2" required placeholder="Entrez la deuxième donnée...">
            </div>

            <div class="form-group">
                <label for="field3">Champ 3 :</label>
                <input type="text" id="field3" required placeholder="Entrez la troisième donnée...">
            </div>

            <button type="submit" id="submitBtn">Envoyer les données</button>
        </form>

        <div id="messageStatus" class="status-message"></div>
    </div>

    <!-- Connexion vers votre script JS existant -->
    <script src="public/js/app.js"></script>
</body>
</html>
