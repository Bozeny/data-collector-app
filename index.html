<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Collector Offline App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Collecteur de Données Terrain</h1>
        <p class="subtitle">Stockage persistant automatique après validation.</p>
        
        <div class="counter-box" style="margin-bottom: 20px; padding: 10px; background: #eef; border-radius: 5px;">
            Formulaires sécurisés localement : <strong id="counterLocal">0</strong>
        </div>

        <form id="collectorForm">
            <div class="form-group" style="margin-bottom: 15px;">
                <label for="field1">Champ 1 :</label><br>
                <input type="text" id="field1" required placeholder="Entrez la première donnée..." style="width: 100%; padding: 8px;">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label for="field2">Champ 2 :</label><br>
                <input type="text" id="field2" required placeholder="Entrez la deuxième donnée..." style="width: 100%; padding: 8px;">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label for="field3">Champ 3 :</label><br>
                <input type="text" id="field3" placeholder="Entrez la troisième donnée..." style="width: 100%; padding: 8px;">
            </div>

            <button type="submit" id="submitBtn" style="padding: 10px 20px; background: #0070f3; color: white; border: none; cursor: pointer;">
                Enregistrer sur l'appareil
            </button>
        </form>

        <div id="messageStatus" class="status-message" style="margin-top: 15px; font-weight: bold;"></div>

        <div class="export-zone" style="margin-top: 35px; border-top: 1px solid #ccc; padding-top: 20px;">
            <h3>Extraction pour Microsoft Access</h3>
            <button type="button" onclick="exporterPourAccess();" style="padding: 10px 20px; background-color: #107c41; color: white; border: none; cursor: pointer;">
                Télécharger le fichier (.CSV)
            </button>
        </div>
    </div>

    <script src="./public/js/app.js"></script>
</body>
</html>
